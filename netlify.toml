[build]
  command = "npx expo export --platform web && node fix-module.js && cp -r public/* dist/ 2>/dev/null || true"
  publish = "dist"

[[headers]]
  for = "/_expo/static/js/*"
  [headers.values]
    Content-Type = "application/javascript; charset=utf-8"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
